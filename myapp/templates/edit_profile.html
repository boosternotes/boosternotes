{% extends 'index.html' %}
{% load static %}

{% block content %}
<style>
  .profile-page {
    min-height: 60vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 16px 64px;
    background: #f5f7fb;
  }
  .profile-card {
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 8px 32px rgba(26,58,143,0.10);
    padding: 40px 36px;
    width: 100%;
    max-width: 480px;
  }
  .profile-card h2 {
    font-size: 1.35rem;
    font-weight: 800;
    color: #1a3a8f;
    margin: 0 0 6px;
  }
  .profile-card .sub {
    font-size: .8rem;
    color: #aaa;
    margin-bottom: 28px;
  }
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-size: .8rem;
    font-weight: 600;
    color: #555;
    margin-bottom: 6px;
  }
  .form-group input {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid #e0e4f0;
    border-radius: 9px;
    font-size: .9rem;
    font-family: inherit;
    color: #222;
    outline: none;
    transition: border .15s;
    box-sizing: border-box;
  }
  .form-group input:focus { border-color: #1a3a8f; }
  .form-group input[disabled] { background: #f8f8f8; color: #aaa; cursor: not-allowed; }
  .save-btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #1a3a8f, #0d6efd);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: .95rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity .15s;
    font-family: inherit;
  }
  .save-btn:hover { opacity: .9; }
  .alert-success {
    background: #e8f8f0;
    color: #1d9e75;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: .82rem;
    font-weight: 600;
    margin-bottom: 18px;
  }
  .alert-error {
    background: #fff0f0;
    color: #e74c3c;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: .82rem;
    font-weight: 600;
    margin-bottom: 18px;
  }
  @media (max-width: 500px) {
    .profile-card { padding: 28px 18px; }
  }
</style>

<div class="profile-page">
  <div class="profile-card">
    <h2>✏️ Edit Profile</h2>
    <div class="sub">Update your account details below</div>

    {% if messages %}
      {% for msg in messages %}
        <div class="alert-{% if msg.tags == 'error' %}error{% else %}success{% endif %}">
          {{ msg }}
        </div>
      {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" value="{{ user.username }}" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ user.email }}">
      </div>

      <div class="form-group">
        <label>First Name</label>
        <input type="text" name="first_name" value="{{ user.first_name }}">
      </div>

      <div class="form-group">
        <label>Last Name</label>
        <input type="text" name="last_name" value="{{ user.last_name }}">
      </div>

      <div class="form-group">
        <label>New Password <span style="color:#aaa;font-weight:400;">(leave blank to keep current)</span></label>
        <input type="password" name="password" placeholder="Enter new password">
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" name="password_confirm" placeholder="Confirm new password">
      </div>

      <button class="save-btn" type="submit">💾 Save Changes</button>
    </form>
  </div>
</div>
{% endblock content %}
